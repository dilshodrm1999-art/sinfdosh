services:
  db:
    image: postgres:16-alpine
    container_name: sinfdosh_db
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-sinfdosh}
      POSTGRES_USER: ${POSTGRES_USER:-sinfdosh}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-sinfdosh}
    volumes:
      - pg_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-sinfdosh}"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: sinfdosh_redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  backend:
    build: ./backend
    container_name: sinfdosh_backend
    command: >
      sh -c "python manage.py makemigrations accounts geo friends chat posts notifications &&
             python manage.py migrate &&
             python manage.py seed_demo --if-empty &&
             daphne -b 0.0.0.0 -p 8000 config.asgi:application"
    volumes:
      - ./backend:/app
      - media_data:/app/media
    env_file:
      - .env
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

  frontend:
    build: ./frontend
    container_name: sinfdosh_frontend
    command: sh -c "npm install && npm run dev"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    environment:
      - NEXT_PUBLIC_API_URL=${NEXT_PUBLIC_API_URL:-http://localhost:8000}
      - NEXT_PUBLIC_WS_URL=${NEXT_PUBLIC_WS_URL:-ws://localhost:8000}
    ports:
      - "3000:3000"
    depends_on:
      - backend

volumes:
  pg_data:
  media_data:
